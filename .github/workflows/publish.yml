name: Publish to PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/datenwissenschaften/ui/frontend/package-lock.json

      - name: Build static assets
        working-directory: src/datenwissenschaften/ui/frontend
        run: |
          npm ci
          npm run build

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Automated Version Bump
        id: bump
        run: |
          python3 - <<EOF
          import os
          import re
          import urllib.error
          import urllib.request

          PYPROJECT = "pyproject.toml"

          def get_project_name(content):
              match = re.search(r'^name = "([^"]+)"', content, re.MULTILINE)
              return match.group(1) if match else None

          def get_version(content):
              match = re.search(r'^version = "([^"]+)"', content, re.MULTILINE)
              return match.group(1) if match else None

          def set_version(version):
              with open(PYPROJECT, "r", encoding="utf-8") as f:
                  content = f.read()
              updated = re.sub(r'^version = "[^"]+"', f'version = "{version}"', content, count=1, flags=re.MULTILINE)
              with open(PYPROJECT, "w", encoding="utf-8") as f:
                  f.write(updated)

          def get_current_version():
              with open(PYPROJECT, "r", encoding="utf-8") as f:
                  return get_version(f.read())

          def parse_version(version):
              match = re.match(r'^(\d+)\.(\d+)\.(\d+)(.*)$', version)
              if not match:
                  return None
              major, minor, patch, suffix = match.groups()
              return int(major), int(minor), int(patch), suffix

          def bump_version(version, increment):
              parsed = parse_version(version)
              if parsed is None:
                  raise ValueError(f"Version must use MAJOR.MINOR.PATCH format: {version}")
              major, minor, patch, _ = parsed
              if increment == "patch":
                  return f"{major}.{minor}.{patch + 1}"
              raise ValueError(f"Unsupported increment: {increment}")

          def pypi_version_exists(project_name, version):
              url = f"https://pypi.org/pypi/{project_name}/{version}/json"
              try:
                  with urllib.request.urlopen(url, timeout=20):
                      return True
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return False
                  raise

          with open(PYPROJECT, "r", encoding="utf-8") as f:
              pyproject_content = f.read()

          project_name = get_project_name(pyproject_content)
          current_str = get_current_version()

          if not project_name:
              print(f"Could not find project name in {PYPROJECT}")
              exit(1)

          if not current_str:
              print(f"Could not find version in {PYPROJECT}")
              exit(1)

          if parse_version(current_str) is None:
              print(f"Unsupported version format in {PYPROJECT}: {current_str}")
              exit(1)

          print(f"Current version in {PYPROJECT}: {current_str}")

          current_str = bump_version(current_str, "patch")
          print(f"Bumping patch version to {current_str}.")

          while pypi_version_exists(project_name, current_str):
              print(f"Version {current_str} already exists on PyPI. Bumping patch version...")
              current_str = bump_version(current_str, "patch")

          set_version(current_str)
          print(f"Updated {PYPROJECT} to {current_str}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write("bumped=true\n")
              f.write(f"new_version={current_str}\n")
          EOF

      - name: Build and Publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish --build

      - name: Commit and Push Version Bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
