name: Publish to PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Automated Version Bump
        id: bump
        run: |
          python3 - <<EOF
          import os
          import subprocess
          import re
          import urllib.error
          import urllib.request
          
          def get_project_name():
              with open("pyproject.toml", "r") as f:
                  content = f.read()
              match = re.search(r'^name = "([^"]+)"', content, re.MULTILINE)
              return match.group(1) if match else None

          def get_version(content):
              match = re.search(r'^version = "([^"]+)"', content, re.MULTILINE)
              return match.group(1) if match else None

          def get_current_version():
              with open("pyproject.toml", "r") as f:
                  return get_version(f.read())

          def get_previous_version():
              try:
                  content = subprocess.run(
                      ["git", "show", "HEAD^:pyproject.toml"],
                      check=True,
                      capture_output=True,
                      text=True,
                  ).stdout
              except subprocess.CalledProcessError:
                  return None
              return get_version(content)

          def major_minor(version):
              match = re.match(r'^(\d+)\.(\d+)(?:\.|$)', version)
              return tuple(map(int, match.groups())) if match else None

          def pypi_version_exists(project_name, version):
              url = f"https://pypi.org/pypi/{project_name}/{version}/json"
              try:
                  with urllib.request.urlopen(url, timeout=20):
                      return True
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return False
                  raise
          
          project_name = get_project_name()
          current_str = get_current_version()
          previous_str = get_previous_version()
          
          if not project_name:
              print("Could not find project name in pyproject.toml")
              exit(1)
          
          if not current_str:
              print("Could not find version in pyproject.toml")
              exit(1)
          
          print(f"Current version in pyproject.toml: {current_str}")
          
          bumped = False
          manually_changed_release = (
              previous_str is not None
              and major_minor(previous_str) is not None
              and major_minor(current_str) is not None
              and major_minor(previous_str) != major_minor(current_str)
          )

          if manually_changed_release:
              print(
                  f"Major/minor version was manually changed from {previous_str} "
                  f"to {current_str}. Skipping automated patch bump."
              )
          else:
              while pypi_version_exists(project_name, current_str):
                  print(f"Version {current_str} already exists on PyPI. Bumping patch version...")
                  subprocess.run(["poetry", "version", "patch"], check=True)
                  current_str = get_current_version()
                  bumped = True
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"bumped={'true' if bumped else 'false'}\n")
              f.write(f"new_version={current_str}\n")
          EOF

      - name: Build and Publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish --build

      - name: Commit and Push Version Bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
