name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Automated Version Bump
        id: bump
        run: |
          python3 - <<EOF
          import os
          import subprocess
          import re
          
          def get_current_version():
              with open("pyproject.toml", "r") as f:
                  content = f.read()
              match = re.search(r'^version = "([^"]+)"', content, re.MULTILINE)
              return match.group(1) if match else None
          
          def get_latest_tag_version():
              try:
                  # Check if we are triggered by a tag
                  ref = os.environ.get("GITHUB_REF", "")
                  if ref and ref.startswith("refs/tags/v"):
                      # When on a tag, we compare with the tag BEFORE it
                      cmd = ["git", "describe", "--tags", "--abbrev=0", "HEAD^"]
                  else:
                      cmd = ["git", "describe", "--tags", "--abbrev=0"]
                  output = subprocess.check_output(cmd, stderr=subprocess.STDOUT).decode().strip()
                  return output.lstrip('v')
              except subprocess.CalledProcessError:
                  return "0.0.0"
          
          def parse_version(v):
              parts = re.findall(r'\d+', v)
              return [int(p) for p in parts[:3]] if parts else [0, 0, 0]
          
          current_str = get_current_version()
          latest_str = get_latest_tag_version()
          
          if not current_str:
              print("Could not find version in pyproject.toml")
              exit(1)
          
          current = parse_version(current_str)
          latest = parse_version(latest_str)
          
          print(f"Current version in pyproject.toml: {current_str}")
          print(f"Latest tag version: {latest_str}")
          
          bumped = False
          if current[0] > latest[0] or current[1] > latest[1]:
              print("Major or minor version was manually increased. Skipping auto-bump.")
          elif current == latest:
              print("No version change detected. Bumping patch version...")
              subprocess.run(["poetry", "version", "patch"], check=True)
              bumped = True
          else:
              print("Version was already manually bumped (likely patch). Skipping auto-bump.")
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"bumped={'true' if bumped else 'false'}\n")
              f.write(f"new_version={get_current_version()}\n")
          EOF

      - name: Build and Publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish --build

      - name: Commit and Push Version Bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Bump version to v${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Ensure Tag exists
        if: steps.bump.outputs.bumped == 'false'
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION does not exist. Creating..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi
