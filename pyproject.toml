[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "datenwissenschaften"
version = "0.0.1"
description = "Python package for datenwissenschaften utilities."
readme = "README.md"
authors = [
    { name = "datenwissenschaften", email = "martin.franke@datenwissenschaften.com" }
]
license = "GPL-3.0-only"
requires-python = ">=3.12,<3.13"
dependencies = [
    "gymnasium>=1.0.0",
    "loguru>=0.7.0",
    "opencv-python>=4.10.0",
    "python-dotenv>=1.0.0",
    "requests>=2.32.0",
    "stable-baselines3>=2.4.0",
    "stable-retro>=0.9.0",
]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

[dependency-groups]
dev = [
    "black>=24.0.0",
    "ruff>=0.14.13",
]

[tool.black]
line-length = 120
target-version = ['py312']

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.poetry]
package-mode = true
packages = [{ include = "datenwissenschaften", from = "src" }]
